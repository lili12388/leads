<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Test</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { color: #00d4aa; }
        .component {
            background: #16213e;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .component .label {
            color: #888;
            font-size: 14px;
        }
        .component .value {
            color: #00d4aa;
            font-family: monospace;
            font-size: 14px;
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hash {
            background: #0f3460;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }
        .hash .label {
            color: #00d4aa;
            font-size: 16px;
            margin-bottom: 10px;
            display: block;
        }
        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.stable { background: #00d4aa33; color: #00d4aa; }
        .status.moderate { background: #f4a26133; color: #f4a261; }
        h2 { color: #f4a261; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🔐 Fingerprint Test</h1>
    <p>This page tests what data your fingerprint captures. Open in Chrome to test.</p>
    
    <h2>Highly Stable Components (Hardware)</h2>
    <div id="stable-components"></div>
    
    <h2>Device-Specific Components</h2>
    <div id="device-components"></div>
    
    <h2>Moderately Stable Components</h2>
    <div id="moderate-components"></div>
    
    <div class="hash">
        <span class="label">Final SHA-256 Fingerprint Hash:</span>
        <div id="final-hash">Computing...</div>
    </div>

    <script>
        function hashShort(str) {
            let hash = 5381;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) + hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).substring(0, 8);
        }

        function addComponent(container, label, value, truncate = false) {
            const div = document.createElement('div');
            div.className = 'component';
            const displayValue = truncate && value.length > 60 ? value.substring(0, 60) + '...' : value;
            div.innerHTML = `
                <span class="label">${label}</span>
                <span class="value">${displayValue}</span>
            `;
            document.getElementById(container).appendChild(div);
            return value;
        }

        async function generateFingerprint() {
            const components = [];
            
            // === HIGHLY STABLE (Hardware) ===
            const sr = `${screen.width}x${screen.height}`;
            addComponent('stable-components', 'Screen Resolution', sr);
            components.push(`sr:${sr}`);
            
            const avail = `${screen.availWidth}x${screen.availHeight}`;
            addComponent('stable-components', 'Available Screen', avail);
            components.push(`avail:${avail}`);
            
            const dpr = window.devicePixelRatio || 1;
            addComponent('stable-components', 'Device Pixel Ratio', String(dpr));
            components.push(`dpr:${dpr}`);
            
            const cores = navigator.hardwareConcurrency || 0;
            addComponent('stable-components', 'CPU Cores', String(cores));
            components.push(`cores:${cores}`);
            
            const mem = navigator.deviceMemory || 'N/A (not Chrome)';
            addComponent('stable-components', 'Device Memory (GB)', String(mem));
            components.push(`mem:${navigator.deviceMemory || 0}`);
            
            const touch = navigator.maxTouchPoints || 0;
            addComponent('stable-components', 'Max Touch Points', String(touch));
            components.push(`touch:${touch}`);
            
            const cd = screen.colorDepth;
            addComponent('stable-components', 'Color Depth', String(cd));
            components.push(`cd:${cd}`);
            
            // === DEVICE SPECIFIC ===
            const plat = navigator.platform;
            addComponent('device-components', 'Platform', plat);
            components.push(`plat:${plat}`);
            
            // WebGL renderer
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        addComponent('device-components', 'GPU Vendor', vendor);
                        addComponent('device-components', 'GPU Renderer', renderer, true);
                        components.push(`gpu:${hashShort(vendor + renderer)}`);
                    }
                }
            } catch (e) {
                addComponent('device-components', 'GPU', 'Not available');
                components.push('gpu:0');
            }
            
            // Canvas fingerprint
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('GMapExtractor', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('GMapExtractor', 4, 17);
                const canvasData = canvas.toDataURL();
                const canvasHash = hashShort(canvasData);
                addComponent('device-components', 'Canvas Fingerprint', canvasHash);
                components.push(`canvas:${canvasHash}`);
            } catch (e) {
                addComponent('device-components', 'Canvas Fingerprint', 'Not available');
                components.push('canvas:0');
            }
            
            // Audio fingerprint - using OfflineAudioContext
            try {
                const AudioContext = window.OfflineAudioContext || window.webkitOfflineAudioContext;
                if (AudioContext) {
                    const context = new AudioContext(1, 44100, 44100);
                    const oscillator = context.createOscillator();
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(10000, context.currentTime);
                    
                    const compressor = context.createDynamicsCompressor();
                    compressor.threshold.setValueAtTime(-50, context.currentTime);
                    compressor.knee.setValueAtTime(40, context.currentTime);
                    compressor.ratio.setValueAtTime(12, context.currentTime);
                    compressor.attack.setValueAtTime(0, context.currentTime);
                    compressor.release.setValueAtTime(0.25, context.currentTime);
                    
                    oscillator.connect(compressor);
                    compressor.connect(context.destination);
                    oscillator.start(0);
                    
                    const audioBuffer = await context.startRendering();
                    const samples = audioBuffer.getChannelData(0);
                    
                    let audioHash = 0;
                    for (let i = 4500; i < 5000; i++) {
                        audioHash += Math.abs(samples[i]);
                    }
                    addComponent('device-components', 'Audio Fingerprint', audioHash.toFixed(6));
                    components.push(`audio:${audioHash.toFixed(6)}`);
                } else {
                    addComponent('device-components', 'Audio Fingerprint', 'Not supported');
                    components.push('audio:0');
                }
            } catch (e) {
                addComponent('device-components', 'Audio Fingerprint', 'Error: ' + e.message);
                components.push('audio:0');
            }
            
            // === MODERATELY STABLE ===
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown';
            addComponent('moderate-components', 'Timezone', tz);
            components.push(`tz:${tz}`);
            
            const lang = navigator.language;
            addComponent('moderate-components', 'Language', lang);
            components.push(`lang:${lang}`);
            
            // Generate final hash
            const fingerprintString = components.join('|');
            console.log('Raw fingerprint components:', fingerprintString);
            
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(fingerprintString));
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            document.getElementById('final-hash').textContent = hashHex;
            
            return hashHex;
        }

        generateFingerprint();
    </script>
</body>
</html>
